name: wise_spends
description: A new Flutter project.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.11.1 <4.0.0"
  flutter: ">=3.41.4"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  ionicons: ^0.2.2
  drift: ^2.32.0
  google_fonts: ^8.0.2
  shimmer: ^3.0.0
  fl_chart: ^1.1.1
  sqlite3: ^3.1.6
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  rxdart: ^0.28.0
  group_radio_button: ^1.3.0
  permission_handler: ^12.0.1
  external_path: ^2.2.0
  file_picker: ^10.3.10
  intl: ^0.20.2
  bloc: ^9.2.0
  settings_ui: ^2.0.2
  dropdown_textfield: ^1.2.0
  get_it: ^9.2.1
  share_plus: ^12.0.1
  pdf: ^3.11.3
  open_file: ^3.5.11
  image_picker: ^1.2.1
  shared_preferences: ^2.5.4
  collection: ^1.19.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  drift_dev: ^2.32.0
  build_runner: ^2.12.1
  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^6.0.0

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  fonts:
    - family: Montserrat
      fonts:
        - asset: assets/fonts/Montserrat-Regular.otf
          weight: 400
        - asset: assets/fonts/Montserrat-SemiBold.otf
          weight: 600
        - asset: assets/fonts/Montserrat-Bold.otf
          weight: 700

  assets:
    - assets/images/facebook.png
    - assets/images/google.png
